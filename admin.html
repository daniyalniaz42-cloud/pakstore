<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Management Desk - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #f1f5f9; color: #1e293b; padding: 24px 12px; }
        .admin-box { max-width: 650px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 12px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #334155; margin-bottom: 6px; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; background: #f8fafc; }
        .upload-zone { border: 2px dashed #cbd5e1; background: #f8fafc; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; position: relative; }
        #image-file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .preview-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 12px; }
        .preview-wrapper { position: relative; width: 100%; aspect-ratio: 1; border-radius: 6px; overflow: hidden; border: 1px solid #e2e8f0; }
        .preview-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img-btn { position: absolute; top: 2px; right: 2px; background: rgba(224, 36, 36, 0.9); color: white; border: none; width: 16px; height: 16px; font-size: 10px; font-weight: bold; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-submit { background: #1a56db; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .inventory-title { font-size: 15px; font-weight: 700; margin-top: 12px; margin-bottom: 12px; color: #334155; display: flex; justify-content: space-between; align-items: center; }
        .inventory-list { display: flex; flex-direction: column; gap: 10px; }
        .inventory-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; }
        .item-info { display: flex; align-items: center; gap: 10px; }
        .item-thumb { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; background: #e2e8f0; }
        .item-details h4 { font-size: 13px; font-weight: 700; color: #1e293b; }
        .item-details p { font-size: 11px; color: #64748b; }
        .btn-delete { background: #fee2e2; color: #ef4444; border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .order-card { background: #fafafa; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .order-meta-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: #475569; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; margin-bottom: 8px; }
        .order-items-list { font-size: 13px; color: #1e293b; padding-left: 14px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1>⚙️ Store Inventory Console (Cloud Secured)</h1>
        <p class="subtitle">Realtime server par direct data upload karein</p>

        <form id="product-addition-form" onsubmit="handleFormSubmission(event)">
            <div class="form-group">
                <label>Product Name / Title</label>
                <input type="text" id="prod-name" placeholder="e.g., Soft Cotton Wear" required>
            </div>
            <div class="form-group">
                <label>Product Placement Target</label>
                <select id="prod-placement" required>
                    <option value="fashion|men-clothes">👕 Men's Fashion - Clothes</option>
                    <option value="fashion|men-watches">⌚ Men's Fashion - Watches</option>
                    <option value="fashion|women-clothes">👗 Women's Fashion - Clothes</option>
                    <option value="fashion|women-jewellery">💍 Women's Fashion - Jewellery</option>
                    <option value="electronics|elec-audio">🎧 Electronics - Audio & Pods</option>
                    <option value="electronics|elec-wearables">⌚ Electronics - Smart Wearables</option>
                </select>
            </div>
            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                    <label>Retail Price (Rs.)</label>
                    <input type="number" id="prod-price" required>
                </div>
                <div>
                    <label>Size Variant Box?</label>
                    <select id="prod-size-needed">
                        <option value="no">No Sizes</option>
                        <option value="yes">Enable Sizes</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Product Description</label>
                <textarea id="prod-desc" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Upload Images (Max 10)</label>
                <div class="upload-zone">
                    <p>📸 Select Images</p>
                    <input type="file" id="image-file-input" accept="image/*" multiple onchange="processMultipleImages(event)">
                </div>
                <div class="preview-grid" id="image-previews-container"></div>
            </div>
            <button type="submit" class="btn-submit">Publish Product</button>
        </form>

        <div class="inventory-title">📦 Cloud Active Products</div>
        <div class="inventory-list" id="admin-inventory-target"></div>
    </div>

    <div class="admin-box" style="border-top: 4px solid #0e9f6e;">
        <div class="inventory-title">
            <span>📥 Received Orders Log (Permanent Server)</span>
            <button class="btn-delete" style="background:#e2e8f0; color:#475569;" onclick="clearAllOrdersTrack()">Wipe All</button>
        </div>
        <div id="admin-orders-target-node"></div>
    </div>

    <script>
        // FIREBASE CONNECTIVITY CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAf6-Z11aoBDCHeKt1M-8v_4ql6yBzPqwY",
            authDomain: "pakstore-db-29eff.firebaseapp.com",
            databaseURL: "https://pakstore-db-29eff-default-rtdb.firebaseio.com",
            projectId: "pakstore-db-29eff",
            storageBucket: "pakstore-db-29eff.firebasestorage.app",
            messagingSenderId: "553423977932",
            appId: "1:553423977932:web:e9a41935cf6e5fde887169"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let uploadedImagesBase64 = [];

        window.onload = function() {
            // Read Products Realtime
            database.ref('products').on('value', (snapshot) => {
                const products = snapshot.val();
                const container = document.getElementById('admin-inventory-target');
                if(!products) { container.innerHTML = `<p style="text-align:center; color:#94a3b8; font-size:12px; padding:12px 0;">No active items.</p>`; return; }
                
                container.innerHTML = Object.keys(products).map(key => {
                    const p = products[key];
                    const firstImg = (p.images && p.images.length > 0) ? p.images[0] : '';
                    return `
                        <div class="inventory-item">
                            <div class="item-info">
                                <img src="${firstImg}" class="item-thumb">
                                <div class="item-details"><h4>${p.name}</h4><p>Rs. ${p.price}</p></div>
                            </div>
                            <button class="btn-delete" onclick="removeProductNode('${key}')">Remove</button>
                        </div>`;
                }).join('');
            });

            // Read Orders Realtime
            database.ref('orders').on('value', (snapshot) => {
                const orders = snapshot.val();
                const target = document.getElementById('admin-orders-target-node');
                if(!orders) { target.innerHTML = `<p style="text-align:center; color:#94a3b8; font-size:12px; padding:20px 0;">Koi order nahi mila.</p>`; return; }
                
                target.innerHTML = Object.keys(orders).map(key => {
                    const o = orders[key];
                    let itemsSummary = o.items.map(i => `<li>${i.label} <strong>(x${i.qty})</strong></li>`).join('');
                    return `
                        <div class="order-card">
                            <div class="order-meta-header"><span>ID: ${o.id}</span><span>📅 ${o.date}</span></div>
                            <p style="font-size:13px;">👤 <strong>Customer:</strong> ${o.customerName}</p>
                            <p style="font-size:13px;">📞 <strong>WhatsApp:</strong> <a href="https://wa.me/${o.customerPhone}" target="_blank" style="color:#0e9f6e; font-weight:700;">${o.customerPhone}</a></p>
                            <p style="font-size:13px; margin-bottom:8px;">📍 <strong>Address:</strong> ${o.customerAddress}</p>
                            <div style="background:white; padding:8px; border-radius:6px; border:1px solid #e2e8f0; margin-bottom:8px;"><ul class="order-items-list">${itemsSummary}</ul></div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:14px; font-weight:800; color:#1a56db;">Total: Rs. ${o.total}</span>
                                <button class="btn-delete" onclick="deleteSpecificOrderNode('${key}')">Complete / Remove</button>
                            </div>
                        </div>`;
                }).join('');
            });
        };

        function removeProductNode(key) { if(confirm("Delete this product?")) { database.ref('products/' + key).remove(); } }
        function deleteSpecificOrderNode(key) { if(confirm("Mark order as completed/removed?")) { database.ref('orders/' + key).remove(); } }
        function clearAllOrdersTrack() { if(confirm("Wipe all logs from server permanently?")) { database.ref('orders').remove(); } }

        function processMultipleImages(event) {
            const files = event.target.files;
            const remainingSlots = 10 - uploadedImagesBase64.length;
            Array.from(files).slice(0, remainingSlots).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) { uploadedImagesBase64.push(e.target.result); renderThumbnailsLayout(); };
                reader.readAsDataURL(file);
            });
        }

        function renderThumbnailsLayout() {
            document.getElementById('image-previews-container').innerHTML = uploadedImagesBase64.map((imgSrc, idx) => `
                <div class="preview-wrapper"><img src="${imgSrc}"><button type="button" class="remove-img-btn" onclick="uploadedImagesBase64.splice(${idx},1); renderThumbnailsLayout();">×</button></div>`
            ).join('');
        }

        function handleFormSubmission(e) {
            e.preventDefault();
            if(uploadedImagesBase64.length === 0) { alert("Kam az kam ek image lazmi hai!"); return; }
            const placementValue = document.getElementById('prod-placement').value.split('|');

            const item = {
                id: Date.now(),
                name: document.getElementById('prod-name').value.trim(),
                root: placementValue[0],
                sub: placementValue[1],
                price: parseInt(document.getElementById('prod-price').value),
                hasSize: document.getElementById('prod-size-needed').value,
                desc: document.getElementById('prod-desc').value.trim(),
                images: [...uploadedImagesBase64]
            };

            database.ref('products').push(item).then(() => {
                document.getElementById('product-addition-form').reset();
                uploadedImagesBase64 = []; renderThumbnailsLayout();
                alert("🎉 Product Uploaded & Secured on Google Cloud!");
            });
        }
    </script>
</body>
</html>
